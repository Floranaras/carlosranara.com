<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      const path = window.location.pathname;
      const search = window.location.search;
      window.location.replace(
        '/?redirect=' + encodeURIComponent(path + search)
      );
    </script>
  </head>
  <body></body>
</html>
